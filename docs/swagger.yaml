  internal_handler.SearchMessagesRequest:
    properties:
      limit:
        description: 'Maximum number of results to return (default: 20)'
        type: integer
      mode:
        description: 'Search mode: "keyword", "vector", "hybrid" (default: "hybrid")'
        type: string
      query:
        description: Query text for search
        type: string
      session_ids:
        description: Filter by specific session IDs (optional)
        items:
          type: string
        type: array
    required:
    - query
    type: object
  internal_handler.StorageCheckRequest:
    properties:
      cos:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.COSEngineConfig'
      ks3:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.KS3EngineConfig'
      minio:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.MinIOEngineConfig'
      obs:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.OBSEngineConfig'
      oss:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.OSSEngineConfig'
      provider:
        description: '"minio", "cos", "tos", "s3", "oss", "ks3", "obs"'
        type: string
      s3:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.S3EngineConfig'
      tos:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.TOSEngineConfig'
    type: object
  internal_handler.StorageCheckResponse:
    properties:
      bucket_created:
        type: boolean
      message:
        type: string
      ok:
        type: boolean
    type: object
  internal_handler.StorageEngineStatusItem:
    properties:
      allowed:
        type: boolean
      available:
        description: whether the engine can be used
        type: boolean
      description:
        description: short description for UI
        type: string
      name:
        description: '"local", "minio", "cos", "tos", "s3", "oss", "ks3"'
        type: string
    type: object
  internal_handler.TestProviderRequest:
    properties:
      parameters:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.WebSearchProviderParameters'
      provider:
        type: string
    required:
    - provider
    type: object
  internal_handler.TestStoreRequest:
    properties:
      connection_config:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ConnectionConfig'
      engine_type:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.RetrieverEngineType'
    required:
    - connection_config
    - engine_type
    type: object
  internal_handler.TextRelationExtractionRequest:
    properties:
      model_id:
        type: string
      tags:
        items:
          type: string
        type: array
      text:
        type: string
    required:
    - model_id
    - tags
    - text
    type: object
  internal_handler.UpdateAgentRequest:
    properties:
      avatar:
        type: string
      config:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.CustomAgentConfig'
      description:
        type: string
      name:
        type: string
    type: object
  internal_handler.UpdateChunkRequest:
    properties:
      chunk_index:
        type: integer
      content:
        type: string
      embedding:
        items:
          type: number
        type: array
      end_at:
        type: integer
      image_info:
        type: string
      is_enabled:
        type: boolean
      start_at:
        type: integer
    type: object
  internal_handler.UpdateKnowledgeBaseRequest:
    properties:
      config:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.KnowledgeBaseConfig'
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  internal_handler.UpdateModelRequest:
    properties:
      description:
        type: string
      display_name:
        type: string
      name:
        type: string
      parameters:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ModelParameters'
      source:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ModelSource'
      type:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ModelType'
    type: object
  internal_handler.UpdateProviderRequest:
    properties:
      description:
        type: string
      is_default:
        type: boolean
      name:
        type: string
      parameters:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.WebSearchProviderParameters'
    type: object
  internal_handler.UpdateStoreRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  internal_handler.UpdateSystemSettingRequest:
    properties:
      value:
        description: |-
          Value is intentionally `any` (decoded as float64 / string / bool /
          etc. by the JSON unmarshaller). Service.encodeForType normalises
          these against the registry's declared type and rejects mismatches.
    type: object
  internal_handler.addMemberRequest:
    properties:
      email:
        type: string
      role:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.TenantRole'
    required:
    - email
    - role
    type: object
  internal_handler.addSimilarQuestionsRequest:
    properties:
      similar_questions:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - similar_questions
    type: object
  internal_handler.auditLogListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.AuditLog'
        type: array
      next_cursor:
        type: integer
      success:
        type: boolean
    type: object
  internal_handler.createInvitationRequest:
    properties:
      email:
        type: string
      message:
        type: string
      role:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.TenantRole'
    required:
    - email
    - role
    type: object
  internal_handler.createInviteLinkRequest:
    properties:
      message:
        type: string
      role:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.TenantRole'
    required:
    - role
    type: object
  internal_handler.createTenantRequest:
    properties:
      description:
        maxLength: 512
        type: string
      name:
        maxLength: 128
        minLength: 1
        type: string
    required:
    - name
    type: object
  internal_handler.invitationLookupRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  internal_handler.invitationLookupResponse:
    properties:
      expires_at:
        type: string
      role:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.TenantRole'
      tenant_id:
        type: integer
      tenant_name:
        type: string
    type: object
  internal_handler.registerByInviteRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      token:
        type: string
      username:
        type: string
    required:
    - email
    - password
    - token
    - username
    type: object
  internal_handler.updateLastFAQImportResultDisplayStatusRequest:
    properties:
      display_status:
        enum:
        - open
        - close
        type: string
    required:
    - display_status
    type: object
  internal_handler.updateMemberRoleRequest:
    properties:
      role:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.TenantRole'
    required:
    - role
    type: object
  internal_handler.updateMyPreferencesRequest:
    properties:
      enable_memory:
        type: boolean
      last_active_tenant_id:
        description: |-
          LastActiveTenantID lets the SPA persist "after a fresh login,
          drop me back into this workspace" across devices. Send a positive
          tenant id to set / replace, or 0 to clear. Membership is validated
          at next login, not here. Nil = field omitted from the PATCH and
          stays untouched.
        type: integer
    type: object
  internal_handler_session.AttachmentUpload:
    properties:
      data:
        description: Base64-encoded file content
        type: string
      file_name:
        description: Original filename
        type: string
      file_size:
        description: File size in bytes
        type: integer
    type: object
  internal_handler_session.CreateKnowledgeQARequest:
    properties:
      agent_enabled:
        description: Whether agent mode is enabled for this request
        type: boolean
      agent_id:
        description: Selected custom agent ID (backend resolves shared agent and its
          tenant from share relation)
        type: string
      attachment_uploads:
        description: Attached files (documents, audio, etc.)
        items:
          $ref: '#/definitions/internal_handler_session.AttachmentUpload'
        type: array
      channel:
        description: 'Source channel: "web", "api", "im", etc.'
        type: string
      disable_title:
        description: Whether to disable auto title generation
        type: boolean
      enable_memory:
        description: |-
          EnableMemory is the per-request override for the memory feature.
          Pointer + omitempty so the request can distinguish three states:
            nil   = client did not specify; backend falls back to the calling
                    user's persisted preference (user.preferences.enable_memory),
                    defaulting to false if that's also unset. This is the path
                    used by the normal logged-in chat UI now that the toggle is
                    stored server-side per user.
            *true / *false = explicit override. Embedded mode forces *false so a
                    user's personal memory setting doesn't leak into a widget
                    context; older clients that still send a literal bool also
                    land here (back-compat).
        type: boolean
      images:
        description: Attached images for multimodal chat
        items:
          $ref: '#/definitions/internal_handler_session.ImageAttachment'
        type: array
      knowledge_base_ids:
        description: Selected knowledge base ID for this request
        items:
          type: string
        type: array
      knowledge_ids:
        description: Selected knowledge ID for this request
        items:
          type: string
        type: array
      mentioned_items:
        description: '@mentioned knowledge bases and files'
        items:
          $ref: '#/definitions/internal_handler_session.MentionedItemRequest'
        type: array
      query:
        description: Query text for knowledge base search
        type: string
      summary_model_id:
        description: Optional summary model ID for this request (overrides session
          default)
        type: string
      web_search_enabled:
        description: Whether web search is enabled for this request
        type: boolean
    required:
    - query
    type: object
  internal_handler_session.CreateSessionRequest:
    properties:
      description:
        description: Description for the session (optional)
        type: string
      title:
        description: Title for the session (optional)
        type: string
    type: object
  internal_handler_session.GenerateTitleRequest:
    properties:
      messages:
        description: Messages to use as context for title generation
        items:
          $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.Message'
        type: array
    required:
    - messages
    type: object
  internal_handler_session.ImageAttachment:
    properties:
      caption:
        description: VLM analysis result (context-aware, single call)
        type: string
      data:
        description: base64 data URI from frontend (data:image/png;base64,...)
        type: string
      url:
        description: serving URL after saving to storage
        type: string
    type: object
  internal_handler_session.MentionedItemRequest:
    properties:
      id:
        type: string
      kb_type:
        description: '"document" or "faq" (only for kb type)'
        type: string
      name:
        type: string
      type:
        description: '"kb" for knowledge base, "file" for file'
        type: string
    type: object
  internal_handler_session.SearchKnowledgeRequest:
    properties:
      knowledge_base_id:
        description: Single knowledge base ID (for backward compatibility)
        type: string
      knowledge_base_ids:
        description: IDs of knowledge bases to search (multi-KB support)
        items:
          type: string
        type: array
      knowledge_ids:
        description: IDs of specific knowledge (files) to search
        items:
          type: string
        type: array
      query:
        description: Query text to search for
        type: string
    required:
    - query
    type: object
  internal_handler_session.StopSessionRequest:
    properties:
      message_id:
        type: string
    required:
    - message_id
    type: object
  internal_handler_session.batchDeleteRequest:
    properties:
      delete_all:
        type: boolean
      ids:
        items:
          type: string
        type: array
    type: object
info:
  contact:
    name: WeKnora Github
    url: https://github.com/Tencent/WeKnora
  description: WeKnora 知识库管理系统 API 文档
  termsOfService: http://swagger.io/terms/
  title: WeKnora API
  version: "1.0"
paths:
  /agent/tool-approvals/{pending_id}:
    post:
      consumes:
      - application/json
      description: 用户审批通过或驳回一次工具调用（用于 Agent 阻塞等待审批的场景）
      parameters:
      - description: 待审批记录 ID
        in: path
        name: pending_id
        required: true
        type: string
      - description: '{decision: \'
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 审批结果
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
        "404":
          description: 待审批记录不存在
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 处理 MCP 工具调用待审批请求
      tags:
      - MCP服务
  /agents:
    get:
      consumes:
      - application/json
      description: 获取当前租户的所有智能体（包括内置智能体）
      produces:
      - application/json
      responses:
        "200":
          description: 智能体列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 获取智能体列表
      tags:
      - 智能体
    post:
      consumes:
      - application/json
      description: 创建新的自定义智能体
      parameters:
      - description: 智能体信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.CreateAgentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 创建的智能体
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 创建智能体
      tags:
      - 智能体
  /agents/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定的智能体
      parameters:
      - description: 智能体ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
        "403":
          description: 无法删除内置智能体
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
        "404":
          description: 智能体不存在
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 删除智能体
      tags:
      - 智能体
    get:
      consumes:
      - application/json
      description: 根据ID获取智能体详情
      parameters:
      - description: 智能体ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 智能体详情
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
        "404":
          description: 智能体不存在
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 获取智能体详情
      tags:
      - 智能体
    put:
      consumes:
      - application/json
      description: 更新智能体的名称、描述和配置
      parameters:
      - description: 智能体ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.UpdateAgentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新后的智能体
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
        "403":
          description: 无法修改内置智能体
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 更新智能体
      tags:
      - 智能体
  /agents/{id}/copy:
    post:
      consumes:
      - application/json
      description: 复制指定的智能体
      parameters:
      - description: 智能体ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: 复制成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
        "404":
          description: 智能体不存在
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 复制智能体
      tags:
      - 智能体
  /agents/{id}/shares/{share_id}:
    delete:
      description: 从智能体的共享列表中移除指定共享关系
      parameters:
      - description: 智能体 ID
        in: path
        name: id
        required: true
        type: string
      - description: 共享记录 ID
        in: path
        name: share_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'success: true'
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 取消智能体共享
      tags:
      - 组织
  /agents/{id}/suggested-questions:
    get:
      consumes:
      - application/json
      description: 基于智能体关联的知识库，返回推荐问题供用户快捷提问
      parameters:
      - description: 智能体ID
        in: path
        name: id
        required: true
        type: string
      - description: 知识库ID列表（逗号分隔），覆盖智能体默认配置
        in: query
        name: knowledge_base_ids
        type: string
      - description: 知识ID列表（逗号分隔），限定到具体文档
        in: query
        name: knowledge_ids
        type: string
      - description: 返回数量上限（默认6）
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 推荐问题列表
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
        "404":
          description: 智能体不存在
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 获取推荐问题
      tags:
      - 智能体
  /agents/placeholders:
    get:
      consumes:
      - application/json
      description: 获取所有可用的提示词占位符定义，按字段类型分组
      produces:
      - application/json
      responses:
        "200":
          description: 占位符定义
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 获取占位符定义
      tags:
      - 智能体
  /agents/type-presets:
    get:
      consumes:
      - application/json
      description: 返回所有 smart-reasoning 下可用的智能体类型预设（RAG/Wiki/Hybrid/Custom），用于编辑器自动填充系统提示词、工具和
        KB 兼容性
      produces:
      - application/json
      responses:
        "200":
          description: 预设列表
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      - ApiKeyAuth: []
      summary: 获取智能体类型预设列表
      tags:
      - 智能体
  /api/v1/knowledge/{id}/spans:
    get:
      consumes:
      - application/json
      description: 返回该知识在解析流水线的 trace tree（root → stage → subspan）：每段状态、耗时、input/output、错误码、langfuse_trace_id。支持
        ?attempt=N 查看历史尝试；不传则返回最新尝试。前端用于渲染时间线 + 多模态/embedding 子节点 + 一键跳转 Langfuse。
      parameters:
      - description: 知识ID
        in: path
        name: id
        required: true
        type: string
      - description: 指定尝试号；省略=最新
        in: query
        name: attempt
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取知识文档解析的 Span 树（含历史尝试）
      tags:
      - 知识管理
  /auth/auto-setup:
    post:
      consumes:
      - application/json
      description: Lite 版专用：首次启动时自动创建默认用户和租户并返回令牌，后续启动直接签发令牌，免除手动注册/登录流程
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.LoginResponse'
        "403":
          description: 非 Lite 版本
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      summary: 自动初始化（Lite 桌面版）
      tags:
      - 认证
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: 修改当前用户的登录密码
      parameters:
      - description: 密码修改请求
        in: body
        name: request
