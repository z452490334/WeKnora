  github_com_Tencent_WeKnora_internal_types.KnowledgeBase:
    properties:
      asr_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ASRConfig'
        description: ASR config (Automatic Speech Recognition)
      chunk_count:
        description: Chunk count (not stored in database, calculated on query)
        type: integer
      chunking_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ChunkingConfig'
        description: Chunking configuration
      created_at:
        description: Creation time of the knowledge base
        type: string
      creator_id:
        description: |-
          CreatorID records the user ID of whoever originally created the KB.
          Used by the tenant-level RBAC middleware to let Contributors edit
          their own KBs without granting them access to everyone else's.
          Nullable for backward compatibility with rows created before the
          RBAC migration backfilled the column to the tenant Owner.
        type: string
      creator_name:
        description: |-
          CreatorName 是 CreatorID 对应用户的展示名（username / email 等），
          仅在列表场景由 handler 批量回填，不落库；为空表示创建者无法解析（用户已删除、
          CreatorID 为空的老数据等）。前端用它在卡片来源徽章上做 mine vs tenant 的二分。
        type: string
      deleted_at:
        allOf:
        - $ref: '#/definitions/gorm.DeletedAt'
        description: Deletion time of the knowledge base
      description:
        description: Description of the knowledge base
        type: string
      embedding_model_id:
        description: ID of the embedding model
        type: string
      extract_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ExtractConfig'
        description: Extract config
      faq_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.FAQConfig'
        description: FAQConfig stores FAQ specific configuration such as indexing
          strategy
      id:
        description: Unique identifier of the knowledge base
        type: string
      image_processing_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ImageProcessingConfig'
        description: Image processing configuration
      indexing_strategy:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.IndexingStrategy'
        description: |-
          IndexingStrategy controls which indexing pipelines are active for this knowledge base.
          Pipelines: vector search, keyword search, wiki generation, knowledge graph extraction.
      is_pinned:
        description: |-
          IsPinned and PinnedAt are computed per-caller from user_kb_pins
          (see migration 000050). They used to be stored on the row itself,
          which made pinning a tenant-wide ordering decision gated behind
          the kb-edit RBAC guard. The columns are still present in legacy
          schemas for rollback safety but are no longer read or written by
          the application — both fields are tagged `gorm:"-"` so GORM
          ignores them on every CRUD call and the list handler stamps them
          after enriching with the caller's pin set.
        type: boolean
      is_processing:
        description: IsProcessing indicates if there is a processing import task (for
          FAQ type knowledge bases)
        type: boolean
      is_temporary:
        description: Whether this knowledge base is temporary (ephemeral) and should
          be hidden from UI
        type: boolean
      knowledge_count:
        description: Knowledge count (not stored in database, calculated on query)
        type: integer
      name:
        description: Name of the knowledge base
        type: string
      pinned_at:
        description: |-
          PinnedAt records when the current caller pinned this knowledge
          base; nil when they have not.
        type: string
      processing_count:
        description: ProcessingCount indicates the number of knowledge items being
          processed (for document type knowledge bases)
        type: integer
      question_generation_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.QuestionGenerationConfig'
        description: QuestionGenerationConfig stores question generation configuration
          for document knowledge bases
      share_count:
        description: ShareCount indicates the number of organizations this knowledge
          base is shared with (not stored in database)
        type: integer
      storage_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.StorageConfig'
        description: 'Deprecated: legacy COS config column. Kept for backward compatibility
          with old data.'
      storage_provider_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.StorageProviderConfig'
        description: 'Storage provider config (new): only stores provider selection;
          credentials from tenant StorageEngineConfig'
      summary_model_id:
        description: Summary model ID
        type: string
      tenant_id:
        description: Tenant ID
        type: integer
      type:
        description: Type of the knowledge base (document, faq, etc.)
        type: string
      updated_at:
        description: Last updated time of the knowledge base
        type: string
      vector_store_id:
        description: |-
          VectorStoreID references the VectorStore this knowledge base is bound to.
          When nil, the KB falls back to the tenant's effective engines derived from
          the RETRIEVE_DRIVER environment variable (env store flow).
          This field is set once at creation time and must not be modified afterwards;
          enforcement lives at the GORM layer (`<-:create`) plus the service-layer
          KB update path, which omits this field from its update DTO.
        type: string
      vlm_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.VLMConfig'
        description: VLM config
      wiki_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.WikiConfig'
        description: WikiConfig stores wiki-specific configuration (only for wiki
          type knowledge bases)
    type: object
  github_com_Tencent_WeKnora_internal_types.KnowledgeBaseConfig:
    properties:
      chunking_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ChunkingConfig'
        description: Chunking configuration
      faq_config:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.FAQConfig'
