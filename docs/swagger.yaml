  github_com_Tencent_WeKnora_internal_infrastructure_chunker.DocProfile:
    properties:
      all_caps_short_line_count:
        type: integer
      avg_line_len:
        type: number
      blank_paragraph_breaks:
        type: integer
      chinese_chapter_count:
        type: integer
      code_ratio:
        type: number
      detected_langs:
        description: Detected language hints (best-effort)
        items:
          type: string
        type: array
      english_chapter_count:
        type: integer
      form_feed_count:
        type: integer
      german_chapter_count:
        type: integer
      has_code:
        type: boolean
      has_tables:
        description: Content characteristics
        type: boolean
      md_heading_counts:
        additionalProperties:
          type: integer
        description: Markdown structure
        type: object
      md_heading_total:
        type: integer
      numbered_section_count:
        description: Heuristic indicators
        type: integer
      repeated_footer_count:
        type: integer
      std_line_len:
        type: number
      total_chars:
        type: integer
      total_lines:
        type: integer
      visual_sep_count:
        type: integer
    type: object
  github_com_Tencent_WeKnora_internal_infrastructure_chunker.StrategyTier:
    enum:
    - heading
    - heuristic
    - legacy
    type: string
    x-enum-varnames:
    - TierHeading
    - TierHeuristic
    - TierLegacy
  github_com_Tencent_WeKnora_internal_infrastructure_chunker.TierRejection:
    properties:
      reason:
        type: string
      tier:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_infrastructure_chunker.StrategyTier'
    type: object
  github_com_Tencent_WeKnora_internal_types.ASRConfig:
    properties:
      enabled:
        type: boolean
      language:
        description: 'optional: language hint for transcription'
        type: string
      model_id:
        type: string
    type: object
  github_com_Tencent_WeKnora_internal_types.AgentStep:
    properties:
      iteration:
        description: Iteration number (0-indexed)
        type: integer
      reasoning_content:
        description: |-
          ReasoningContent stores the OpenAI-protocol reasoning_content emitted by the
          model in this round. Persisted on AgentStep so cross-turn replay can put it
          back on the assistant message — required by MiMo / DeepSeek V3.2+ thinking
          mode, ignored by providers that don't recognize the field.
        type: string
      thought:
        description: LLM's reasoning/thinking (Think phase)
        type: string
      timestamp:
        description: When this step occurred
        type: string
      tool_calls:
        description: Tools called in this step (Act phase)
        items:
          $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ToolCall'
        type: array
    type: object
  github_com_Tencent_WeKnora_internal_types.AnswerStrategy:
    enum:
    - all
    - random
    type: string
    x-enum-varnames:
    - AnswerStrategyAll
    - AnswerStrategyRandom
  github_com_Tencent_WeKnora_internal_types.AuditAction:
    enum:
    - rbac.member_added
    - rbac.member_removed
    - rbac.member_role_changed
    - rbac.member_left
    - rbac.access_denied
    - rbac.invitation_sent
    - rbac.invitation_accepted
    - rbac.invitation_declined
    - rbac.invitation_revoked
    - rbac.invitation_expired
    - vector_store.created
    - vector_store.updated
    - vector_store.deleted
    - opensearch.index_created
    - opensearch.index_deleted
    - opensearch.reindex_executed
    - system.setting_changed
    - system.admin_promoted
    - system.admin_revoked
    type: string
    x-enum-varnames:
    - AuditActionMemberAdded
    - AuditActionMemberRemoved
    - AuditActionMemberRoleChanged
    - AuditActionMemberLeft
    - AuditActionAccessDenied
    - AuditActionInvitationSent
    - AuditActionInvitationAccepted
    - AuditActionInvitationDeclined
    - AuditActionInvitationRevoked
    - AuditActionInvitationExpired
    - AuditActionVectorStoreCreated
    - AuditActionVectorStoreUpdated
    - AuditActionVectorStoreDeleted
    - AuditActionOpenSearchIndexCreated
    - AuditActionOpenSearchIndexDeleted
    - AuditActionOpenSearchReindexExecuted
    - AuditActionSystemSettingChanged
    - AuditActionSystemAdminPromoted
    - AuditActionSystemAdminRevoked
  github_com_Tencent_WeKnora_internal_types.AuditLog:
    properties:
      action:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.AuditAction'
      actor_role:
        type: string
      actor_user_id:
        type: string
      created_at:
        type: string
      details:
        items:
          type: integer
        type: array
      id:
        type: integer
      outcome:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.AuditOutcome'
      request_method:
        type: string
      request_path:
        type: string
      target_id:
        type: string
      target_type:
        type: string
      target_user_id:
        type: string
      tenant_id:
        type: integer
    type: object
  github_com_Tencent_WeKnora_internal_types.AuditOutcome:
    enum:
    - success
    - denied
    type: string
    x-enum-varnames:
    - AuditOutcomeSuccess
    - AuditOutcomeDenied
  github_com_Tencent_WeKnora_internal_types.COSEngineConfig:
    properties:
      app_id:
        type: string
      bucket_name:
        type: string
      path_prefix:
        type: string
      region:
        type: string
      secret_id:
        type: string
      secret_key:
        type: string
    type: object
  github_com_Tencent_WeKnora_internal_types.ChatHistoryConfig:
    properties:
      embedding_model_id:
        description: |-
          EmbeddingModelID is the ID of the embedding model used for vectorizing chat messages.
          Once messages have been indexed, the model cannot be changed (requires re-indexing).
        type: string
      enabled:
        description: Enabled controls whether chat history indexing is active
        type: boolean
      knowledge_base_id:
        description: |-
          KnowledgeBaseID is the auto-managed hidden knowledge base for chat history.
          This is set internally when the feature is first enabled; users should not set this directly.
        type: string
    type: object
  github_com_Tencent_WeKnora_internal_types.ChunkingConfig:
    properties:
      child_chunk_size:
        description: |-
          ChildChunkSize is the size of child chunks used for embedding (default: 384).
          Only used when EnableParentChild is true.
        type: integer
      chunk_overlap:
        description: Chunk overlap
        type: integer
      chunk_size:
        description: Chunk size
        type: integer
      enable_multimodal:
        description: EnableMultimodal (deprecated, kept for backward compatibility
          with old data)
        type: boolean
      enable_parent_child:
        description: |-
          EnableParentChild enables two-level parent-child chunking strategy.
          When enabled, large parent chunks provide context while small child chunks
          are used for vector matching. Retrieval matches on child but returns parent content.
        type: boolean
      languages:
        description: |-
          Languages hints the heuristic patterns. Empty = auto-detect from content.
          Examples: ["de"], ["en", "zh"].
        items:
          type: string
        type: array
      parent_chunk_size:
        description: |-
          ParentChunkSize is the size of parent chunks (default: 4096).
          Only used when EnableParentChild is true.
        type: integer
      parser_engine_rules:
        description: |-
          ParserEngineRules configures which parser engine to use for each file type.
          When empty, the builtin engine is used for all types.
        items:
          $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ParserEngineRule'
        type: array
      separators:
        description: Separators
        items:
          type: string
        type: array
      strategy:
        description: |-
          Strategy selects the adaptive chunking tier. Empty / "legacy" preserves
          the historical recursive splitter; "auto" lets a profiler pick between
          heading-aware, heuristic and recursive tiers; "heading" / "heuristic" /
          "recursive" pin the tier explicitly.
        type: string
      token_limit:
        description: |-
          TokenLimit caps chunk size in approximate tokens. 0 = use ChunkSize
          as a character count.
        type: integer
    type: object
  github_com_Tencent_WeKnora_internal_types.ConnectionConfig:
    properties:
      addr:
        description: Common
        type: string
      api_key:
        description: AES-GCM encrypted
        type: string
      database:
        description: |-
          Database name used by engines that support database-level namespaces
          (currently Milvus, Tencent VectorDB, and Doris).
        type: string
      grpc_address:
        description: Weaviate
        type: string
      host:
        description: Qdrant
        type: string
      http_port:
        description: |-
          Doris: HTTP port for Stream Load API (FE default 8030).
          Addr is reused for the MySQL protocol "host:9030"; HTTPPort + the host of Addr
          together form the FE HTTP endpoint used by Stream Load.
        type: integer
      insecure_skip_verify:
        description: |-
          InsecureSkipVerify disables TLS certificate verification when
          talking to the backing store over HTTPS. Defaults to false
          (secure). Set to true ONLY for self-signed development clusters;
          production deployments should provide trusted certificates via
          the system CA pool. Cross-driver applicable but currently only
          the OpenSearch driver (Phase 3) reads this field. Note: this
          differs from the Qdrant-specific UseTLS below, which *enables*
          TLS on gRPC connections — InsecureSkipVerify only controls
          *verification* of an already-TLS connection.
        type: boolean
      password:
        description: AES-GCM encrypted
        type: string
      port:
        type: integer
      scheme:
        type: string
      use_default_connection:
        description: Postgres
        type: boolean
      use_tls:
        type: boolean
      username:
        type: string
      version:
        description: |-
          Version is the detected server version (e.g., "7.10.1", "16.2", "1.12.6").
          Auto-populated by TestConnection on successful connectivity check.
        type: string
    type: object
  github_com_Tencent_WeKnora_internal_types.ContextCompressionStrategy:
    enum:
    - sliding_window
    - smart
    type: string
    x-enum-varnames:
    - ContextCompressionSlidingWindow
    - ContextCompressionSmart
  github_com_Tencent_WeKnora_internal_types.ContextConfig:
    properties:
      compression_strategy:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.ContextCompressionStrategy'
        description: 'Compression strategy: "sliding_window" or "smart"'
      max_tokens:
        description: Maximum tokens allowed in LLM context
        type: integer
      recent_message_count:
        description: |-
          For sliding_window: number of messages to keep
          For smart: number of recent messages to keep uncompressed
        type: integer
      summarize_threshold:
        description: 'Summarize threshold: number of messages before summarization'
        type: integer
    type: object
  github_com_Tencent_WeKnora_internal_types.CreateOrganizationRequest:
    properties:
      avatar:
        description: optional avatar URL
        maxLength: 512
        type: string
      description:
        maxLength: 1000
        type: string
      invite_code_validity_days:
        description: 'optional: 0=never, 1, 7, 30; default 7'
        type: integer
      member_limit:
        description: 'optional: max members; 0=unlimited; default 50'
        type: integer
      name:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - name
    type: object
  github_com_Tencent_WeKnora_internal_types.CredentialsConfig:
    properties:
      weknoracloud:
        $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.WeKnoraCloudCredentials'
    type: object
  github_com_Tencent_WeKnora_internal_types.CustomAgentConfig:
    properties:
      agent_mode:
        description: |-
          ===== Basic Settings =====
          Agent mode: "quick-answer" for RAG mode, "smart-reasoning" for ReAct agent mode
        type: string
      agent_type:
        description: |-
          AgentType is a preset category under smart-reasoning mode that pre-fills
          system prompt, allowed tools and recommended KB compatibility.
          Valid values: "rag-qa", "wiki-qa", "hybrid-rag-wiki", "custom".
          Empty / unknown values are treated as "custom" (no preset applied).
          Ignored for quick-answer mode.
        type: string
      allowed_tools:
        description: Allowed tools (only for agent type)
        items:
          type: string
        type: array
      asr_model_id:
        description: ASR model ID for audio transcription (optional)
        type: string
      audio_upload_enabled:
        description: 'Whether audio upload (ASR transcription) is enabled for this
          agent (default: false)'
        type: boolean
      context_template:
        description: Context template for normal mode (how to format retrieved chunks)
        type: string
      context_template_id:
        description: |-
          ContextTemplateID references a template ID in prompt_templates/ YAML files.
          If set and ContextTemplate is empty, the template content will be resolved at startup.
        type: string
      data_analysis_enabled:
        description: |-
          ===== Data Analysis Settings =====
          Whether to run the legacy in-pipeline DuckDB SQL data-analysis stage when
          the retrieved chunks include CSV/Excel files. This issues an extra LLM
          call to generate a SQL query and is disabled by default because most
          quick-answer / RAG-style agents do not want the added latency.
        type: boolean
      embedding_top_k:
        description: |-
          ===== Retrieval Strategy Settings (for both modes) =====
          Embedding/Vector retrieval top K
        type: integer
      enable_query_expansion:
        description: |-
          ===== Advanced Settings (mainly for normal mode) =====
          Whether to enable query expansion
        type: boolean
      enable_rewrite:
        description: Whether to enable query rewrite for multi-turn conversations
        type: boolean
      fallback_prompt:
        description: Fallback prompt (when FallbackStrategy is "model")
        type: string
      fallback_response:
        description: Fixed fallback response (when FallbackStrategy is "fixed")
        type: string
      fallback_strategy:
        description: 'Fallback strategy: "fixed" for fixed response, "model" for model
          generation'
        type: string
      faq_direct_answer_threshold:
        description: FAQ direct answer threshold - if similarity > this value, use
          FAQ answer directly
        type: number
      faq_priority_enabled:
        description: |-
          ===== FAQ Strategy Settings =====
          Whether FAQ priority strategy is enabled (FAQ answers prioritized over document chunks)
        type: boolean
      faq_score_boost:
        description: FAQ score boost multiplier - FAQ results score multiplied by
          this factor
        type: number
      history_turns:
        description: Number of history turns to keep in context
        type: integer
      image_storage_provider:
        description: |-
          Storage provider for image uploads: "local", "minio", "cos", "tos", "s3", "oss", "ks3".
          Empty means use the global/tenant default provider.
        type: string
      image_upload_enabled:
        description: |-
          ===== Image Upload / Multimodal Settings =====
          Whether image upload is enabled for this agent (default: false)
        type: boolean
      intent_prompts:
        additionalProperties:
          type: string
        description: |-
          IntentPrompts holds per-intent system prompt overrides for non-retrieval
          intents (greeting, chitchat, etc.). Empty values fall back to templates
          under config/prompt_templates/intent_prompts.yaml.
        type: object
      kb_selection_mode:
        description: |-
          ===== Knowledge Base Settings =====
          Knowledge base selection mode: "all" = all KBs, "selected" = specific KBs, "none" = no KB
        type: string
      keyword_threshold:
        description: Keyword retrieval threshold
        type: number
      knowledge_bases:
        description: Associated knowledge base IDs (only used when KBSelectionMode
          is "selected")
        items:
          type: string
        type: array
      llm_call_timeout:
        description: Timeout for a single LLM call in seconds (0 = use global default)
        type: integer
      max_completion_tokens:
        description: Maximum completion tokens (only for normal mode)
        type: integer
      max_iterations:
        description: |-
          ===== Agent Mode Settings =====
          Maximum iterations for ReAct loop (only for agent type)
        type: integer
      mcp_selection_mode:
        description: 'MCP service selection mode: "all" = all enabled MCP services,
          "selected" = specific services, "none" = no MCP'
        type: string
      mcp_services:
        description: Selected MCP service IDs (only used when MCPSelectionMode is
          "selected")
        items:
          type: string
        type: array
      model_id:
        description: |-
          ===== Model Settings =====
          Model ID to use for conversations
        type: string
      multi_turn_enabled:
        description: |-
          ===== Multi-turn Conversation Settings =====
          Whether multi-turn conversation is enabled
        type: boolean
      query_understand_model_id:
        description: |-
          Dedicated chat model ID for the query-understanding (rewrite + intent) step.
          When empty, the main conversation ModelID is used as a fallback.
        type: string
      rerank_model_id:
        description: ReRank model ID for retrieval
        type: string
      rerank_threshold:
        description: Rerank threshold
        type: number
      rerank_top_k:
        description: Rerank top K
        type: integer
      retain_retrieval_history:
        description: Whether to retain retrieval history across turns
        type: boolean
      retrieve_kb_only_when_mentioned:
        description: |-
          Whether to retrieve knowledge base only when explicitly mentioned with @ (default: false)
          When true, knowledge base retrieval only happens if user explicitly mentions KB/files with @
          When false, knowledge base retrieval happens according to KBSelectionMode
        type: boolean
      rewrite_prompt_system:
        description: Rewrite prompt system message
        type: string
      rewrite_prompt_user:
        description: Rewrite prompt user message template
        type: string
      selected_skills:
        description: Selected skill names (only used when SkillsSelectionMode is "selected")
        items:
          type: string
        type: array
      skills_selection_mode:
        description: |-
          ===== Skills Settings (only for smart-reasoning mode) =====
          Skills selection mode: "all" = all preloaded skills, "selected" = specific skills, "none" = no skills
        type: string
      suggested_prompts:
        description: |-
          ===== Suggested Prompts =====
          推荐问题列表，用于在前端对话面板展示快捷提问
        items:
          type: string
        type: array
      supported_file_types:
        description: |-
          ===== File Type Restriction Settings =====
          Supported file types for this agent (e.g., ["csv", "xlsx", "xls"])
          Empty means all file types are supported
          When set, only files with matching extensions can be used with this agent
        items:
          type: string
        type: array
      system_prompt:
        description: System prompt for the agent (unified prompt, uses web_search_status
          placeholder for dynamic behavior)
        type: string
      system_prompt_id:
        description: |-
          SystemPromptID references a template ID in prompt_templates/ YAML files.
          If set and SystemPrompt is empty, the template content will be resolved at startup.
        type: string
      temperature:
        description: Temperature for LLM (0-1)
        type: number
      thinking:
        description: Whether to enable thinking mode (for models that support extended
          thinking)
        type: boolean
      vector_threshold:
        description: Vector retrieval threshold
        type: number
      vlm_model_id:
        description: VLM model ID for image analysis (optional, falls back to tenant-level
          VLM)
        type: string
      web_fetch_enabled:
        description: Whether to auto-fetch full page content for reranked web search
          results
        type: boolean
      web_fetch_top_n:
        description: 'Max number of pages to fetch after rerank (default: 3)'
        type: integer
      web_search_enabled:
        description: |-
          ===== Web Search Settings =====
          Whether web search is enabled
        type: boolean
      web_search_max_results:
        description: Maximum web search results
        type: integer
      web_search_provider_id:
        description: |-
          WebSearchProviderID references a specific WebSearchProviderEntity.
          If empty, the tenant's default provider (is_default=true) is used.
        type: string
    type: object
  github_com_Tencent_WeKnora_internal_types.DataSource:
    properties:
      config:
        description: |-
          Encrypted configuration (API credentials, tokens, etc.)
          Stored as JSON with AES-256-GCM encryption
        items:
          type: integer
        type: array
      conflict_strategy:
        description: 'Conflict resolution strategy: overwrite or skip'
        type: string
      created_at:
        description: Creation timestamp
        type: string
      deleted_at:
        allOf:
        - $ref: '#/definitions/gorm.DeletedAt'
        description: Soft delete timestamp
      error_message:
        description: Error message if status is "error"
        type: string
      id:
        description: Unique identifier
        type: string
      knowledge_base_id:
        description: Target knowledge base ID
        type: string
      last_sync_at:
        description: Last successful sync timestamp
        type: string
      last_sync_cursor:
        description: Cursor or state for incremental sync (connector-specific)
        items:
          type: integer
        type: array
      last_sync_result:
        description: Summary of last sync result
        items:
          type: integer
        type: array
      latest_sync_log:
        allOf:
        - $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.SyncLog'
        description: Latest sync log (not stored in DB, populated on query)
      name:
        description: User-friendly name
        type: string
      status:
        description: 'Current status: active, paused, error'
        type: string
      sync_deletions:
        description: Whether to sync deletions from source
        type: boolean
      sync_log_retention_days:
        description: 'Number of days to keep sync logs (default: 30)'
        type: integer
      sync_mode:
        description: 'Sync mode: "incremental" (recommended) or "full"'
        type: string
      sync_schedule:
        description: Cron expression for scheduled syncs (e.g., "0 */6 * * *" = every
          6 hours)
