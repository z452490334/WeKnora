  /system/admin/list:
    get:
      description: |-
        Retrieve a paginated list of users with system administrator
        privileges (SystemAdmin only). Supports `offset` (default 0)
        and `limit` (default 50, max 200) query parameters. Walks the
        partial-friendly idx_users_is_system_admin index.
      parameters:
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      - default: 50
        description: Page size (max 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: System admins retrieved successfully
          schema:
            $ref: '#/definitions/internal_handler.ListSystemAdminsResponse'
        "403":
          description: 'Forbidden: not a system admin'
          schema:
            additionalProperties: true
            type: object
      summary: List all system administrators
      tags:
      - System Admin
  /system/admin/promote:
    post:
      consumes:
      - application/json
      description: |-
        Grant system administrator privileges to a user (SystemAdmin only).
        Idempotent: re-promoting an existing system admin returns 200 with no DB write.
        Identify the user by email (preferred for human operators) or user_id (UUID, for API clients).
      parameters:
      - description: User promotion request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.PromoteUserToSystemAdminRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User promoted successfully
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.UserInfo'
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 'Forbidden: not a system admin'
          schema:
            additionalProperties: true
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties: true
            type: object
      summary: Promote a user to system administrator
      tags:
      - System Admin
  /system/admin/revoke:
    post:
      consumes:
      - application/json
      description: |-
        Remove system administrator privileges from a user (SystemAdmin only).
        Two safety guards: the caller cannot revoke their own privileges,
        and revoking the last remaining system admin is rejected — both
        prevent a SystemAdmin from accidentally locking the platform out
        of system-level administration. Idempotent on already-non-admin users.
      parameters:
      - description: User revocation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.RevokeSystemAdminRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Privileges revoked successfully
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.UserInfo'
        "400":
          description: Bad request / would remove last admin / self-revoke
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 'Forbidden: not a system admin'
          schema:
            additionalProperties: true
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties: true
            type: object
      summary: Revoke system administrator privileges from a user
      tags:
      - System Admin
  /system/admin/settings:
    get:
      description: |-
        Return every row in the system_settings table (system-scope,
        not tenant-scope). SystemAdmin only.
      produces:
      - application/json
      responses:
        "200":
          description: list of settings
          schema:
            items:
              $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.SystemSetting'
            type: array
        "403":
          description: 'Forbidden: not a system admin'
          schema:
            additionalProperties: true
            type: object
      summary: List all system settings
      tags:
      - System Admin
  /system/admin/settings/{key}:
    delete:
      description: |-
        Removes the DB override for :key so the 3-tier resolver
        falls back to the environment variable (when configured)
        or the in-code default. Idempotent — resetting a key
        that was never persisted returns 200.
      parameters:
      - description: Setting key
        in: path
        name: key
        required: true
        type: string
      responses:
        "200":
          description: Reset acknowledged
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Unknown key
          schema:
            additionalProperties: true
            type: object
        "500":
          description: DB write failed
          schema:
            additionalProperties: true
            type: object
      summary: Reset a system setting to ENV / built-in default
      tags:
      - System Admin
    get:
      description: |-
        Returns the row matching :key. 404 when the key is unknown
        to the registry; 200 with the row when known.
      parameters:
      - description: Setting key (e.g. file.max_size_mb)
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: the setting row
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.SystemSetting'
        "400":
          description: Unknown key
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Key registered but DB row absent
          schema:
            additionalProperties: true
            type: object
      summary: Get a single system setting by key
      tags:
      - System Admin
    put:
      consumes:
      - application/json
      description: |-
        Persist a new value for :key. Service validates the
        rawValue against the registry's declared value_type and
        rejects mismatches with 400. SystemAdmin only. Emits an
        audit row (action=system.setting_changed) on success.
      parameters:
      - description: Setting key
        in: path
        name: key
        required: true
        type: string
      - description: New value
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.UpdateSystemSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: the updated row
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.SystemSetting'
        "400":
          description: Bad request / unknown key / type mismatch
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 'Forbidden: not a system admin'
          schema:
            additionalProperties: true
            type: object
      summary: Update a system setting value
      tags:
      - System Admin
  /system/admin/tenants/apply-default-storage-quota:
    post:
      description: |-
        Reads the current value of `tenant.default_storage_quota_gb`
        (3-tier resolver: DB > ENV > default) and writes that many
        GiB into storage_quota for every row in tenants. Bypasses
        the per-tenant PUT whitelist, which forbids storage_quota
        edits by Owners. SystemAdmin only.
        Idempotent — running twice with the same setting is a no-op.
      produces:
      - application/json
      responses:
        "200":
          description: '{ affected: int64, quota_bytes: int64 }'
          schema:
            additionalProperties: true
            type: object
        "500":
          description: DB write failed
          schema:
            additionalProperties: true
            type: object
      summary: Apply the default storage quota to every existing tenant
      tags:
      - System Admin
