        description: Knowledge ID the event was about (may be empty for KB-level events).
        type: string
      pages_affected:
        description: |-
          Wiki pages affected by this event. Each ref carries both slug (for
          navigation) and title (for display) so the log renders human-
          readable text without a post-hoc slug→title lookup that might fail
          for now-deleted pages.
        items:
          $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.WikiLogPageRef'
        type: array
      summary:
        description: One-line summary of the change, as it was when the event was
          logged.
        type: string
      tenant_id:
        description: Tenant scope, mirrored from the enclosing knowledge base.
        type: integer
    type: object
